<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTTP Basics Example</title>
</head>
<body>
    <h1>HTTP Basics Example</h1>
    <p>This is a simple example of an HTML page that can be served over HTTP.</p>
    
    <br /><br />

    <h3>Form Submission using GET</h3>
    <form method="get" action="">
        Name: <input type="text" name="name">
        <br /><br />
        Email: <input type="email" name="email">
        <br /><br />
        Age: <input type="number" name="age">
        <br /><br />
        <input type="submit" value="Submit with GET">
    </form>

    <br /><br />
    
    <h3>Form Submission using POST</h3>
    <form method="post" action="">
        Name: <input type="text" name="name">
        <br /><br />
        Email: <input type="email" name="email">
        <br /><br />
        Age: <input type="number" name="age">
        <br /><br />
        <input type="submit" value="Submit with POST">
    </form>
</body>
</html>
